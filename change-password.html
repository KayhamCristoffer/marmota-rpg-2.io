<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toca das Marmotas ⚔️ - Redefinir Senha</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .cp-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:40px 36px; width:100%;
      max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .cp-logo { text-align:center; margin-bottom:28px; }
    .cp-logo .logo-icon { font-size:2.5rem; }
    .cp-logo h1 { font-family:var(--font-title); color:var(--gold); font-size:1.4rem; margin:8px 0 4px; }
    .cp-logo p  { font-size:.82rem; color:var(--text-muted); }
    .cp-title   { font-family:var(--font-title); color:var(--text-primary); font-size:1.05rem; margin-bottom:20px; text-align:center; }
    .pwd-input-wrap { position:relative; }
    .pwd-input-wrap input { width:100%; padding-right:44px; }
    .pwd-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px; font-size:.9rem; }
    .pwd-toggle:hover { color:var(--text-primary); }
    .strength-bar { height:4px; border-radius:2px; background:var(--bg-input); margin-top:6px; overflow:hidden; }
    .strength-fill { height:100%; border-radius:2px; transition:width .3s,background .3s; width:0; }
    .strength-label { font-size:.72rem; color:var(--text-muted); margin-top:3px; }
    .field-hint { font-size:.72rem; margin-top:3px; }
    .field-hint.ok  { color:#22c55e; }
    .field-hint.err { color:#ef4444; }
    .cp-success {
      text-align:center; padding:20px 0;
      display:none;
    }
    .cp-success i { font-size:3rem; color:#22c55e; margin-bottom:12px; display:block; }
    .cp-success h3 { font-family:var(--font-title); color:var(--text-primary); margin-bottom:8px; }
    .cp-success p  { font-size:.85rem; color:var(--text-muted); margin-bottom:20px; }
    #cpError { display:none; background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); color:#ef4444; border-radius:var(--radius-sm); padding:10px 14px; font-size:.85rem; margin-bottom:14px; }
    .loading-overlay-cp { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
    .loading-overlay-cp.show { display:flex; }
    .loading-overlay-cp .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
    .loading-overlay-cp p { color:var(--text-secondary); font-size:.9rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body class="auth-page">

  <div class="loading-overlay-cp" id="cpLoader">
    <div class="spinner"></div>
    <p>Aguarde…</p>
  </div>

  <div class="cp-card">
    <div class="cp-logo">
      <div class="logo-icon">🦫</div>
      <h1>Toca das Marmotas</h1>
      <p>Redefinição de senha</p>
    </div>

    <!-- Form -->
    <div id="cpForm">
      <p class="cp-title"><i class="fas fa-lock"></i> Criar nova senha</p>
      <div id="cpError"></div>

      <div class="form-group">
        <label>Nova Senha *</label>
        <div class="pwd-input-wrap">
          <input type="password" id="cpNewPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
          <button class="pwd-toggle" type="button" id="toggleNewPwd" title="Mostrar/ocultar">
            <i class="fas fa-eye" id="eyeNewIcon"></i>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="cpStrengthFill"></div></div>
        <div class="strength-label" id="cpStrengthLabel">Digite uma senha</div>
      </div>

      <div class="form-group">
        <label>Confirmar Senha *</label>
        <div class="pwd-input-wrap">
          <input type="password" id="cpConfirmPassword" placeholder="Repita a nova senha" autocomplete="new-password"/>
          <button class="pwd-toggle" type="button" id="toggleConfirmPwd" title="Mostrar/ocultar">
            <i class="fas fa-eye" id="eyeConfirmIcon"></i>
          </button>
        </div>
        <div class="field-hint" id="cpConfirmHint"></div>
      </div>

      <button class="btn-primary" id="cpSaveBtn" style="width:100%;margin-top:8px">
        <i class="fas fa-save"></i> Salvar Nova Senha
      </button>

      <div style="text-align:center;margin-top:16px">
        <a href="index.html" style="font-size:.82rem;color:var(--text-muted);text-decoration:none">
          <i class="fas fa-arrow-left"></i> Voltar ao login
        </a>
      </div>
    </div>

    <!-- Sucesso -->
    <div class="cp-success" id="cpSuccess">
      <i class="fas fa-check-circle"></i>
      <h3>Senha alterada!</h3>
      <p>Sua senha foi redefinida com sucesso.<br>Você pode fazer login agora.</p>
      <a href="index.html" class="btn-primary" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;padding:12px 28px">
        <i class="fas fa-sign-in-alt"></i> Ir para o Login
      </a>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module">
    import { sb } from './supabase/client.js';

    // ── Helpers UI ─────────────────────────────────────────────
    function showLoader(on) {
      document.getElementById('cpLoader').classList.toggle('show', on);
    }
    function showError(msg) {
      const el = document.getElementById('cpError');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }
    function showToast(msg, type = 'info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'}"></i> ${msg}`;
      c.appendChild(t);
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 4000);
    }

    // ── Toggle password visibility ─────────────────────────────
    function togglePwd(inputId, iconId) {
      const inp = document.getElementById(inputId);
      const ico = document.getElementById(iconId);
      if (!inp || !ico) return;
      const isText = inp.type === 'text';
      inp.type = isText ? 'password' : 'text';
      ico.className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
    }
    document.getElementById('toggleNewPwd')?.addEventListener('click',     () => togglePwd('cpNewPassword',    'eyeNewIcon'));
    document.getElementById('toggleConfirmPwd')?.addEventListener('click', () => togglePwd('cpConfirmPassword', 'eyeConfirmIcon'));

    // ── Password strength ──────────────────────────────────────
    document.getElementById('cpNewPassword')?.addEventListener('input', (e) => {
      const val  = e.target.value;
      const fill = document.getElementById('cpStrengthFill');
      const lbl  = document.getElementById('cpStrengthLabel');
      if (!fill || !lbl) return;
      if (!val) { fill.style.width = '0'; lbl.textContent = 'Digite uma senha'; return; }
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      score = Math.min(4, score);
      const colors = ['#ef4444','#ef4444','#f59e0b','#22c55e','#22c55e'];
      const labels = ['Fraca','Fraca','Regular','Boa','Forte'];
      fill.style.width   = `${(score / 4) * 100}%`;
      fill.style.background = colors[score];
      lbl.textContent    = labels[score];
    });

    // ── Confirm match ──────────────────────────────────────────
    document.getElementById('cpConfirmPassword')?.addEventListener('input', () => {
      const pwd  = document.getElementById('cpNewPassword')?.value;
      const conf = document.getElementById('cpConfirmPassword')?.value;
      const hint = document.getElementById('cpConfirmHint');
      if (!hint) return;
      if (!conf) { hint.textContent = ''; hint.className = 'field-hint'; return; }
      if (pwd === conf) { hint.textContent = '✓ Senhas conferem'; hint.className = 'field-hint ok'; }
      else              { hint.textContent = '✗ Senhas não conferem'; hint.className = 'field-hint err'; }
    });

    // ── On load: verify session from URL hash ──────────────────
    // Supabase injects #access_token=...&type=recovery into the URL
    window.addEventListener('DOMContentLoaded', async () => {
      // Supabase SDK with detectSessionInUrl:true will handle the hash automatically
      // But we need to wait for the auth state to settle
      const { data: { session } } = await sb.auth.getSession();

      // Check if we have a recovery session
      // Supabase sets the session type to 'recovery' when coming from reset email
      const hash = window.location.hash;
      if (!session && !hash.includes('access_token')) {
        // No recovery session, redirect to login
        showToast('Link de redefinição inválido ou expirado. Solicite um novo.', 'error');
        setTimeout(() => window.location.href = 'index.html', 3000);
        return;
      }

      // If hash present, let Supabase process it
      if (hash.includes('access_token') && hash.includes('type=recovery')) {
        // Session will be established by Supabase automatically
        // Just show the form
        showToast('✅ Link válido! Defina sua nova senha abaixo.', 'success');
      }
    });

    // ── Save new password ──────────────────────────────────────
    document.getElementById('cpSaveBtn')?.addEventListener('click', async () => {
      showError('');
      const pwd  = document.getElementById('cpNewPassword')?.value;
      const conf = document.getElementById('cpConfirmPassword')?.value;

      if (!pwd || pwd.length < 6) {
        showError('A senha deve ter pelo menos 6 caracteres.');
        return;
      }
      if (pwd !== conf) {
        showError('As senhas não conferem.');
        return;
      }

      showLoader(true);
      try {
        const { error } = await sb.auth.updateUser({ password: pwd });
        if (error) throw error;

        document.getElementById('cpForm').style.display    = 'none';
        document.getElementById('cpSuccess').style.display = 'block';
        showToast('🔒 Senha alterada com sucesso!', 'success');
      } catch (err) {
        showError(err.message || 'Erro ao alterar senha. Solicite um novo link de redefinição.');
      } finally {
        showLoader(false);
      }
    });

    // Enter key support
    document.getElementById('cpConfirmPassword')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('cpSaveBtn')?.click();
    });
  </script>
</body>
</html>
